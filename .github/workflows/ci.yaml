name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: threeal/setup-pnpm-action@v1.0.0
        with:
          version: 10.33.4

      - name: Install dependencies
        run: pnpm install

      - name: Check types
        run: pnpm tsc

      - name: Test
        run: pnpm test

      - name: Check formatting
        run: pnpm prettier --check .

      - name: Check lint
        run: pnpm eslint

      - name: Package
        run: pnpm pack
